name: Home AI Architecture Integrity Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run architecture verification
        run: |
          python -m architecture.introspection.cli_verify

      - name: Fail if verification failed
        run: |
          echo "If this step runs, verification passed."
